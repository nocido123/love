<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Monthsary!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff0f5;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #message {
      margin-top: 20px;
      font-size: 22px;
      color: #333;
    }
    img {
      margin-top: 20px;
      max-width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: none;
    }
    audio {
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>💖 Happy Monthsary! 💖</h1>
  <p>Click the button to reveal a heartfelt surprise:</p>
  <button onclick="showMessage()">Reveal</button>
  <div id="message"></div>

  <!-- First photo -->
  <img id="photo1" 
       src="https://www.dropbox.com/scl/fi/sxw0uafb0yn72a0c222kh/2421a5b9a6ef2843ddf9d245b3fb2d5d_0.jpeg?rlkey=3hdxt6o6y62e3d2dljtmu2s5j&st=hetcy7dz&raw=1" 
       alt="Special Memory 1">

  <!-- Second photo -->
  <img id="photo2" 
       src="https://www.dropbox.com/scl/fi/zrv7umdibnku5uphou85t/7c1cf5d291e3d397686c3eda4b832c58_0.jpeg?rlkey=vm5mn5mo64xpgmtmx5z5ak9rb&st=xpg8ey9d&raw=1" 
       alt="Special Memory 2">

  <!-- Third photo -->
  <img id="photo3" 
       src="https://www.dropbox.com/scl/fi/72plywqjkw19p2kzapjqq/05abc8d4afb7d981777b2557bb98b616.png?rlkey=lwib9tnsnj1q1sqf2q8sdmtyp&st=92ebc421&raw=1" 
       alt="Special Memory 3">

  <!-- Music -->
  <audio id="song" controls>
    <source src="https://www.dropbox.com/scl/fi/670wbodb6colvbgeqc1vy/Clinton-Kane-I-GUESS-IM-IN-LOVE.mp3?rlkey=dukv6yong0u1y71107ibxw6s4&st=n4erwu49&raw=1" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    function showMessage() {
      document.getElementById("message").innerText = 
        "🌹 Happy Monthsary, my love! Thank you for every smile, every laugh, and every moment we share. Here’s to many more months together 💕";
      document.getElementById("photo1").style.display = "block";
      document.getElementById("photo2").style.display = "block";
      document.getElementById("photo3").style.display = "block";
      document.getElementById("song").style.display = "block";
    }
  </script>
</body>
</html>
