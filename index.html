<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Monthsary!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff0f5;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #message {
      margin-top: 20px;
      font-size: 22px;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>💖 Happy Monthsary! 💖</h1>
  <p>Click the button to reveal a heartfelt surprise:</p>
  <button onclick="showMessage()">Reveal</button>
  <div id="message"></div>

  <script>
    function showMessage() {
      document.getElementById("message").innerText = 
        "🌹 Happy Monthsary, my love! Thank you for every smile, every laugh, and every moment we share. Here’s to many more months together 💕";
    }
  </script>
</body>
</html>
