<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Monthsary!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff0f5;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #message {
      margin-top: 20px;
      font-size: 22px;
      color: #333;
      opacity: 0;
      transition: opacity 2s ease-in;
    }
    .photo-grid {
      display: none;
      margin-top: 20px;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .photo-grid img {
      max-width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }
    audio {
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>💖 Happy Monthsary! 💖</h1>
  <p>Click the button to reveal a heartfelt surprise:</p>
  <button onclick="showMessage()">Reveal</button>
  <div id="message"></div>

  <!-- Collage of photos -->
  <div id="photoGrid" class="photo-grid">
    <img id="photo1" src="https://www.dropbox.com/scl/fi/sxw0uafb0yn72a0c222kh/2421a5b9a6ef2843ddf9d245b3fb2d5d_0.jpeg?rlkey=3hdxt6o6y62e3d2dljtmu2s5j&st=hetcy7dz&raw=1" alt="Special Memory 1">
    <img id="photo2" src="https://www.dropbox.com/scl/fi/zrv7umdibnku5uphou85t/7c1cf5d291e3d397686c3eda4b832c58_0.jpeg?rlkey=vm5mn5mo64xpgmtmx5z5ak9rb&st=xpg8ey9d&raw=1" alt="Special Memory 2">
    <img id="photo3" src="https://www.dropbox.com/scl/fi/72plywqjkw19p2kzapjqq/05abc8d4afb7d981777b2557bb98b616.png?rlkey=lwib9tnsnj1q1sqf2q8sdmtyp&st=92ebc421&raw=1" alt="Special Memory 3">
  </div>

  <!-- Music -->
  <audio id="song">
    <source src="https://www.dropbox.com/scl/fi/670wbodb6colvbgeqc1vy/Clinton-Kane-I-GUESS-IM-IN-LOVE.mp3?rlkey=dukv6yong0u1y71107ibxw6s4&st=n4erwu49&raw=1" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    function showMessage() {
      // Show message with fade-in
      const msg = document.getElementById("message");
      msg.innerText = "🌹 Happy Monthsary, my love! Thank you for every smile, every laugh, and every moment we share. Here’s to many more months together 💕";
      msg.style.opacity = "1";

      // Show photo grid
      const grid = document.getElementById("photoGrid");
      grid.style.display = "flex";

      // Animate each photo
      setTimeout(() => {
        document.getElementById("photo1").style.opacity = "1";
        document.getElementById("photo1").style.transform = "scale(1)";
      }, 500);
      setTimeout(() => {
        document.getElementById("photo2").style.opacity = "1";
        document.getElementById("photo2").style.transform = "scale(1)";
      }, 1000);
      setTimeout(() => {
        document.getElementById("photo3").style.opacity = "1";
        document.getElementById("photo3").style.transform = "scale(1)";
      }, 1500);

      // Play music automatically
      const song = document.getElementById("song");
      song.style.display = "block";
      song.play();
    }
  </script>
</body>
</html>
